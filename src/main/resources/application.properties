# Default config (overridable via env vars or CLI args)
ytcli.client-secrets-path=client_secrets.json
ytcli.tokens-directory=${user.home}/.yt-creator-cli/tokens
ytcli.application-name=yt-creator-cli

# Run as single-shot CLI, not interactive REPL
spring.shell.interactive.enabled=false

# Suppress Spring Boot banner for cleaner CLI output
spring.main.banner-mode=off

# Logging: minimal for CLI usage
logging.level.root=WARN
logging.level.net.gigahurt.ytcreatorcli=INFO
